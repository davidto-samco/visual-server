name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci --coverage
        env:
          NODE_ENV: test
          # Provide minimal env so dotenv doesn't crash in CI
          DB_SERVER: localhost
          DB_DATABASE: test
          DB_USER: test
          DB_PASSWORD: test
          DB_PORT: 1433
